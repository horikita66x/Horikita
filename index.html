<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HORIKITA66 — BRUTAL STORE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0c0c;
            font-family: 'Impact', 'Arial Black', 'Inter', system-ui, monospace;
            color: #e0e0e0;
            line-height: 1.4;
            padding: 2rem 1.2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* железный фон */
        .bg-metal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, #111 0px, #111 2px, #1a1a1a 2px, #1a1a1a 8px);
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.2), #000000);
            z-index: -1;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* хедер — как тату */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 1.5rem;
            border-bottom: 3px solid #c0a050;
            background: rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .brand {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #d4af37;
            text-shadow: 3px 3px 0px #5a3e0b;
            word-break: break-word;
        }

        .tagline {
            color: #aaa;
            font-size: 0.7rem;
            margin-top: 0.5rem;
            font-family: monospace;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            font-weight: bold;
            background: #1f1f1f;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border: 1px solid #c0a050;
        }

        /* сетка товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
            margin: 2.5rem 0;
        }

        .product-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1rem;
            transition: 0.2s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 0 #2a2a2a;
            transform: translateY(-4px);
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: #c0a050;
            box-shadow: 0 12px 0 #2a2a2a;
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
            border: 1px solid #333;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-title {
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }

        .product-desc {
            font-size: 0.7rem;
            color: #9a9a9a;
            margin-bottom: 1rem;
            font-family: monospace;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid #2a2a2a;
            padding-top: 0.8rem;
        }

        .price {
            font-weight: 900;
            font-size: 1.3rem;
            color: #f5c542;
        }

        .buy-btn {
            background: #000;
            border: 2px solid #c0a050;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            color: #f5c542;
            font-weight: bold;
            font-size: 0.7rem;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .buy-btn:hover {
            background: #c0a050;
            color: #000;
            border-color: #000;
        }

        .tg-section {
            text-align: center;
            margin: 2.5rem 0;
            padding: 1.5rem;
            background: #0a0a0a;
            border-top: 1px solid #c0a050;
            border-bottom: 1px solid #c0a050;
        }

        .tg-link {
            background: #1a1a1a;
            border: 2px solid #c0a050;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            text-decoration: none;
            color: #f5c542;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .tg-link:hover {
            background: #c0a050;
            color: #000;
            border-color: #000;
        }

        .footer {
            text-align: center;
            font-size: 0.6rem;
            color: #6a6a6a;
            margin-top: 2rem;
            border-top: 1px solid #222;
            padding-top: 1rem;
        }

        @media (max-width: 680px) {
            .brand {
                font-size: 2rem;
            }
            .stats {
                font-size: 0.65rem;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="bg-metal"></div>
<div class="bg-overlay"></div>

<div class="container">
    <div class="header">
        <div class="brand">HORIKITA66</div>
        <div class="tagline">// HARD APPAREL // ONLY REAL //</div>
        <div class="stats">
            <span>👁️ ПОСЕЩЕНИЙ: <span id="visitCounter">0</span></span>
            <span>⚡ ЗАКАЗОВ: <span id="orderCounter">0</span></span>
        </div>
    </div>

    <div class="products-grid" id="productsGrid">
        <!-- товары заполнятся через JS, но можно оставить и статику -->
    </div>

    <div class="tg-section">
        <a href="https://t.me/XOPNKNTA" target="_blank" class="tg-link">
            💪 ЗАКАЗАТЬ В TELEGRAM 💪
        </a>
        <div style="font-size: 0.65rem; margin-top: 0.6rem; color:#aaa;">пиши @XOPNKNTA — размер, цвет, доставка</div>
    </div>

    <div class="footer">
        HORIKITA66 // BRUTAL STORE — всё по-честному<br>
        <span id="currentYear"></span>
    </div>
</div>

<script>
    (function() {
        // ========================
        // 1. СЧЁТЧИК ПОСЕЩЕНИЙ (localStorage)
        let visits = localStorage.getItem('brutalVisits');
        if (visits === null) {
            visits = 1;
        } else {
            visits = Number(visits) + 1;
        }
        localStorage.setItem('brutalVisits', visits);
        const visitSpan = document.getElementById('visitCounter');
        if (visitSpan) visitSpan.innerText = visits;

        // 2. СЧЁТЧИК ЗАКАЗОВ (кликов по кнопкам "купить")
        let orders = localStorage.getItem('brutalOrders');
        if (orders === null) orders = 0;
        else orders = Number(orders);
        const orderSpan = document.getElementById('orderCounter');
        if (orderSpan) orderSpan.innerText = orders;

        function incrementOrders() {
            orders++;
            localStorage.setItem('brutalOrders', orders);
            if (orderSpan) orderSpan.innerText = orders;
        }

        // 3. ДАННЫЕ ТОВАРОВ (ссылки уже правильные)
        const products = [
            { title: "Horikita shirt", desc: "100% хлопок · чёрный / белый принт", price: "2500P", img: "https://i.ibb.co/dhHsG8T/IMG-20260421-151728-339.jpg" },
            { title: "Horikita Hoodie", desc: "оверсайз · утяжелённый хлопок", price: "3199P", img: "https://i.ibb.co/Qv5CvXjG/IMG-20260420-203529-254.jpg" },
            { title: "Horikita Sweater", desc: "флис · минималистичный крой", price: "3000P", img: "https://i.ibb.co/xK3FDMPj/IMG-20260420-170510-716.jpg" },
            { title: "Horikita Pullover", desc: "шерсть + акрил · винтажный покрой", price: "5000P", img: "https://i.ibb.co/r2MYmXj9/IMG-20260421-151834-343.jpg" },
            { title: "Horikita Bomber", desc: "нейлон · сатиновая подкладка", price: "3300P", img: "https://i.ibb.co/TD2j6czH/IMG-20260421-151625-372.jpg" },
            { title: "Horikita Denim", desc: "12 oz · прямой крой · японский деним", price: "3400P", img: "https://i.ibb.co/nNPWrHZh/IMG-20260421-152115-473.jpg" }
        ];

        const grid = document.getElementById('productsGrid');
        if (grid) {
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img">
                        <img src="${p.img}" alt="${p.title}" loading="lazy">
                    </div>
                    <div class="product-title">${p.title}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="price-row">
                        <span class="price">${p.price}</span>
                        <a href="https://t.me/XOPNKNTA" target="_blank" class="buy-btn order-btn">КУПИТЬ →</a>
                    </div>
                `;
                grid.appendChild(card);
            });

            // добавляем обработчики для счётчика заказов
            document.querySelectorAll('.order-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // не мешаем переходу на ссылку
                    incrementOrders();
                });
            });
        }

        // 4. АНИМАЦИЯ ПЕЧАТИ ЗАГОЛОВКА (для пацанского вайба)
        const brandEl = document.querySelector('.brand');
        if (brandEl && !brandEl.hasAttribute('data-typed')) {
            brandEl.setAttribute('data-typed', 'true');
            const originalText = brandEl.innerText;
            brandEl.innerText = '';
            let i = 0;
            function typeWriter() {
                if (i < originalText.length) {
                    brandEl.innerText += originalText.charAt(i);
                    i++;
                    setTimeout(typeWriter, 70);
                }
            }
            typeWriter();
        }

        // 5. ТЕКУЩИЙ ГОД В ФУТЕРЕ
        const yearSpan = document.getElementById('currentYear');
        if (yearSpan) {
            yearSpan.innerText = new Date().getFullYear() + ' — REAL BRUTAL';
        }

        // 6. ЭФФЕКТ ПОЯВЛЕНИЯ ТОВАРОВ ПРИ СКРОЛЛЕ (простой)
        const cards = document.querySelectorAll('.product-card');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0px)';
                }
            });
        }, { threshold: 0.2 });
        cards.forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'all 0.4s ease';
            observer.observe(card);
        });
    })();
</script>
</body>
</html>
